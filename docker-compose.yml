services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "883:883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/passwd:/mosquitto/passwd:ro
      
  mailhog:
    image: mailhog/mailhog
    container_name: iot-smtp
    ports:
      - "8025:8025"
      - "1025:1025"

  nodered:
    image: nodered/node-red:latest
    ports:
      - "1880:1880"
    depends_on: 
      - mosquitto